name: Update profile art

# Refreshes the contribution graph SVG on a 5-minute cadence.
# Runs every 5 minutes, plus whenever you push to main, plus on-demand.

"on":
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's practical minimum cadence)
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape real contribution data (no auth needed)
        run: python scripts/fetch_contributions.py

      - name: Render contribution graph SVG (boxes)
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json pratham-heatmap.svg"
